services:
  backend:
    build: ./backend
    image: url-checker-backend
    container_name: url-checker-backend
    ports:
      - '3001:3001'
    environment:
      PORT: '3001'
    restart: unless-stopped

  frontend:
    build: ./frontend
    image: url-checker-frontend
    container_name: url-checker-frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    restart: unless-stopped
